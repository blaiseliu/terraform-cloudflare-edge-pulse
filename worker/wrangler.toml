name = "edge-pulse"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
account_id = "344a7f7e7538e7460c83ad633a8bfe57"

# D1 binding — for wrangler build only.
# Terraform is authoritative for deployments.
# The database_id is a placeholder; wrangler build doesn't validate it.
[[d1_databases]]
binding = "DB"
database_name = "edge-pulse-db"
database_id = "33b76fa5-4c9f-45e4-878f-a91870f0e7db"

[ai]
binding = "AI"

[vars]
AI_MODEL = "@cf/meta/llama-4-scout-17b-16e-instruct"
MAX_CONTENT_CHARS = "2000"
